apiVersion: apps/v1
kind: Deployment
metadata:
  name: agent-workers
  namespace: copilot-prod
  labels:
    app: copilot-workers
spec:
  replicas: 5
  selector:
    matchLabels:
      app: copilot-workers
  template:
    metadata:
      labels:
        app: copilot-workers
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
      containers:
        - name: worker
          image: gcr.io/PROJECT_ID/copilot-api:latest
          command:
            - celery
            - -A
            - app.tasks.celery_app
            - worker
            - --loglevel=info
            - -Q
            - agents,background,embeddings
            - --concurrency=2
          envFrom:
            - secretRef:
                name: copilot-secrets
            - configMapRef:
                name: copilot-config
          resources:
            requests:
              cpu: "500m"
              memory: "1Gi"
            limits:
              cpu: "2000m"
              memory: "4Gi"
          livenessProbe:
            exec:
              command:
                - celery
                - -A
                - app.tasks.celery_app
                - inspect
                - ping
            initialDelaySeconds: 30
            periodSeconds: 30
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: agent-workers-hpa
  namespace: copilot-prod
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: agent-workers
  minReplicas: 3
  maxReplicas: 15
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 60
