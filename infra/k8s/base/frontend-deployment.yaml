apiVersion: apps/v1
kind: Deployment
metadata:
  name: web-frontend
  namespace: copilot-prod
  labels:
    app: copilot-frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: copilot-frontend
  template:
    metadata:
      labels:
        app: copilot-frontend
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
      containers:
        - name: frontend
          image: gcr.io/PROJECT_ID/copilot-frontend:latest
          ports:
            - containerPort: 3000
          env:
            - name: NEXT_PUBLIC_API_URL
              value: "http://api-server/api/v1"
          resources:
            requests:
              cpu: "200m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: web-frontend
  namespace: copilot-prod
spec:
  selector:
    app: copilot-frontend
  ports:
    - port: 80
      targetPort: 3000
  type: ClusterIP
