version: "3.9"

services:
  # ─── Backend API ────────────────────────────────────────────────────
  api:
    build:
      context: ../../backend
      dockerfile: ../infra/docker/Dockerfile.api
    ports:
      - "8000:8000"
    env_file:
      - ../../.env
    environment:
      - POSTGRES_HOST=postgres
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/2
      - MONGODB_URL=mongodb://mongo:27017
      - QDRANT_HOST=qdrant
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ─── Celery Worker ──────────────────────────────────────────────────
  celery-worker:
    build:
      context: ../../backend
      dockerfile: ../infra/docker/Dockerfile.api
    command: celery -A app.tasks.celery_app worker --loglevel=info -Q agents,background,embeddings
    env_file:
      - ../../.env
    environment:
      - POSTGRES_HOST=postgres
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/2
      - MONGODB_URL=mongodb://mongo:27017
    depends_on:
      - redis
      - postgres

  # ─── Frontend Dashboard ─────────────────────────────────────────────
  frontend:
    build:
      context: ../../frontend
      dockerfile: ../infra/docker/Dockerfile.frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://api:8000/api/v1
      - NEXT_PUBLIC_WS_URL=ws://api:8000
    depends_on:
      - api

  # ─── PostgreSQL ─────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: copilot
      POSTGRES_PASSWORD: copilot_dev
      POSTGRES_DB: devops_copilot
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U copilot -d devops_copilot"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ─── Redis ──────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ─── MongoDB (Logs) ─────────────────────────────────────────────────
  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  # ─── Qdrant (Vector DB) ────────────────────────────────────────────
  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage

  # ─── Prometheus ─────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus

  # ─── Grafana ────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus

volumes:
  postgres_data:
  redis_data:
  mongo_data:
  qdrant_data:
  prometheus_data:
  grafana_data:
