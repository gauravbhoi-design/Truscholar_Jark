name: CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ─── Gate 1: Lint (Zero errors required) ─────────────────────────────
  backend-lint:
    name: "Gate 1: Backend Lint & Type Check"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        working-directory: backend
        run: pip install -e ".[dev]"

      - name: Lint (ruff)
        working-directory: backend
        run: ruff check app/

      - name: Type check (mypy — strict mode)
        working-directory: backend
        run: mypy app/ --ignore-missing-imports

  frontend-lint:
    name: "Gate 1: Frontend Lint & Build"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        working-directory: frontend
        run: npm install

      - name: Lint (ESLint)
        working-directory: frontend
        run: npm run lint

      - name: Build (TypeScript compilation)
        working-directory: frontend
        run: npm run build

  # ─── Gate 3: Unit Tests (>= 80% coverage, block merge) ──────────────
  backend-test:
    name: "Gate 3: Backend Unit Tests (>= 80% coverage)"
    runs-on: ubuntu-latest
    needs: [backend-lint]
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: copilot
          POSTGRES_PASSWORD: copilot_dev
          POSTGRES_DB: devops_copilot
        ports: ["5432:5432"]
        options: --health-cmd pg_isready --health-interval 10s --health-timeout 5s --health-retries 5
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: --health-cmd "redis-cli ping" --health-interval 10s --health-timeout 5s --health-retries 5

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        working-directory: backend
        run: pip install -e ".[dev]"

      - name: Run unit tests with coverage
        working-directory: backend
        env:
          POSTGRES_HOST: localhost
          REDIS_URL: redis://localhost:6379/0
          ENVIRONMENT: test
        run: pytest tests/unit/ -v --cov=app --cov-report=xml --cov-report=term-missing --cov-fail-under=80

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: backend/coverage.xml

  # ─── Gate 4: Integration Tests (all critical paths pass) ─────────────
  integration-test:
    name: "Gate 4: Integration Tests"
    runs-on: ubuntu-latest
    needs: [backend-test]
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: copilot
          POSTGRES_PASSWORD: copilot_dev
          POSTGRES_DB: devops_copilot
        ports: ["5432:5432"]
        options: --health-cmd pg_isready --health-interval 10s --health-timeout 5s --health-retries 5
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: --health-cmd "redis-cli ping" --health-interval 10s --health-timeout 5s --health-retries 5

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        working-directory: backend
        run: pip install -e ".[dev]"

      - name: Run integration tests
        working-directory: backend
        env:
          POSTGRES_HOST: localhost
          REDIS_URL: redis://localhost:6379/0
          ENVIRONMENT: test
        run: pytest tests/integration/ -v --timeout=60

  # ─── Gate 5: Security Scan (SAST + dependency scan) ──────────────────
  security-scan:
    name: "Gate 5: Security Scan"
    runs-on: ubuntu-latest
    needs: [backend-lint]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        working-directory: backend
        run: pip install -e ".[dev]" bandit safety

      - name: SAST scan (Bandit — zero critical/high)
        working-directory: backend
        run: bandit -r app/ -ll -ii --format json --output bandit-report.json || true

      - name: Check Bandit results for critical/high findings
        working-directory: backend
        run: |
          if [ -f bandit-report.json ]; then
            CRITICAL=$(python -c "
          import json
          with open('bandit-report.json') as f:
              data = json.load(f)
          high_issues = [r for r in data.get('results', []) if r.get('issue_severity') in ('HIGH', 'CRITICAL')]
          print(len(high_issues))
          " 2>/dev/null || echo "0")
            echo "Critical/High findings: $CRITICAL"
            if [ "$CRITICAL" -gt "0" ]; then
              echo "::error::Found $CRITICAL critical/high security findings. Review bandit-report.json"
              exit 1
            fi
          fi

      - name: Dependency vulnerability check (safety)
        working-directory: backend
        run: safety check --output json || echo "::warning::Dependency vulnerabilities found — review required"

      - name: Upload security reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-reports
          path: |
            backend/bandit-report.json

  # ─── PR Size Check (advisory) ───────────────────────────────────────
  pr-size-check:
    name: "PR Size Check (< 400 lines)"
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check PR size
        run: |
          ADDITIONS=$(git diff --numstat origin/${{ github.base_ref }}...HEAD | awk '{s+=$1} END {print s+0}')
          DELETIONS=$(git diff --numstat origin/${{ github.base_ref }}...HEAD | awk '{s+=$2} END {print s+0}')
          TOTAL=$((ADDITIONS + DELETIONS))
          echo "PR size: +$ADDITIONS -$DELETIONS = $TOTAL lines changed"
          if [ "$TOTAL" -gt 400 ]; then
            echo "::warning::PR has $TOTAL lines changed (ideal < 200, max 400). Consider splitting into smaller PRs for better reviews."
          fi
          if [ "$TOTAL" -gt 200 ]; then
            echo "::notice::PR size ($TOTAL lines) exceeds ideal limit of 200 lines."
          fi

  # ─── Docker Build (Gate 2: Build + artifact) ────────────────────────
  docker-build:
    name: "Gate 2: Docker Build"
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-lint, integration-test, security-scan]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Build API image
        run: docker build -f infra/docker/Dockerfile.api -t copilot-api:${{ github.sha }} backend/

      - name: Build Frontend image
        run: docker build -f infra/docker/Dockerfile.frontend -t copilot-frontend:${{ github.sha }} frontend/
