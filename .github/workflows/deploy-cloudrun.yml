name: Deploy to GCP Cloud Run

on:
  push:
    branches: [master]
  workflow_dispatch:

env:
  GCP_PROJECT_ID: project-tai-aiinterviewer
  GCP_REGION: us-central1
  SA_EMAIL: claude-vscode-key@project-tai-aiinterviewer.iam.gserviceaccount.com
  API_IMAGE: us-central1-docker.pkg.dev/project-tai-aiinterviewer/copilot/api
  FRONTEND_IMAGE: us-central1-docker.pkg.dev/project-tai-aiinterviewer/copilot/frontend
  API_SERVICE: copilot-api
  FRONTEND_SERVICE: copilot-frontend
  # Cloud SQL
  DB_INSTANCE: copilot-db
  DB_NAME: devops_copilot
  DB_USER: copilot

jobs:
  # ─── Step 1: Setup Infrastructure (runs once, idempotent) ───────────
  setup-infra:
    name: Setup GCP Infrastructure
    runs-on: ubuntu-latest
    outputs:
      db_connection_name: ${{ steps.db-info.outputs.connection_name }}
    steps:
      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Enable required APIs
        run: |
          gcloud services enable \
            run.googleapis.com \
            artifactregistry.googleapis.com \
            secretmanager.googleapis.com \
            sqladmin.googleapis.com \
            vpcaccess.googleapis.com \
            --quiet

      - name: Create Artifact Registry
        run: |
          gcloud artifacts repositories create copilot \
            --repository-format=docker --location=${{ env.GCP_REGION }} 2>/dev/null || true

      - name: Create Cloud SQL PostgreSQL instance
        run: |
          # Check if instance already exists
          if gcloud sql instances describe ${{ env.DB_INSTANCE }} --quiet 2>/dev/null; then
            echo "Cloud SQL instance already exists"
          else
            echo "Creating Cloud SQL instance (this takes ~5 min)..."
            gcloud sql instances create ${{ env.DB_INSTANCE }} \
              --database-version=POSTGRES_16 \
              --edition=ENTERPRISE \
              --tier=db-g1-small \
              --region=${{ env.GCP_REGION }} \
              --storage-size=10GB \
              --storage-auto-increase \
              --availability-type=zonal \
              --assign-ip \
              --authorized-networks=0.0.0.0/0 \
              --quiet
            echo "Instance created!"
          fi

      - name: Ensure Cloud SQL instance is running
        run: |
          STATUS=$(gcloud sql instances describe ${{ env.DB_INSTANCE }} --format='value(state)' 2>/dev/null || echo "UNKNOWN")
          echo "Instance status: $STATUS"
          if [ "$STATUS" = "SUSPENDED" ] || [ "$STATUS" = "STOPPED" ]; then
            echo "Starting instance..."
            gcloud sql instances patch ${{ env.DB_INSTANCE }} --activation-policy=ALWAYS --quiet
            echo "Waiting for instance to start..."
            sleep 30
          fi
          # Wait until RUNNABLE
          for i in $(seq 1 20); do
            STATUS=$(gcloud sql instances describe ${{ env.DB_INSTANCE }} --format='value(state)')
            echo "  Status: $STATUS (attempt $i/20)"
            if [ "$STATUS" = "RUNNABLE" ]; then break; fi
            sleep 15
          done

      - name: Setup database and user
        run: |
          # Create database
          gcloud sql databases create ${{ env.DB_NAME }} \
            --instance=${{ env.DB_INSTANCE }} 2>/dev/null || echo "Database already exists"

          # Create or update user
          gcloud sql users create ${{ env.DB_USER }} \
            --instance=${{ env.DB_INSTANCE }} \
            --password=${{ secrets.POSTGRES_PASSWORD }} \
            2>/dev/null || \
          gcloud sql users set-password ${{ env.DB_USER }} \
            --instance=${{ env.DB_INSTANCE }} \
            --password=${{ secrets.POSTGRES_PASSWORD }}

      - name: Get DB connection info
        id: db-info
        run: |
          CONNECTION_NAME=$(gcloud sql instances describe ${{ env.DB_INSTANCE }} --format='value(connectionName)')
          DB_IP=$(gcloud sql instances describe ${{ env.DB_INSTANCE }} --format='value(ipAddresses[0].ipAddress)')
          echo "connection_name=$CONNECTION_NAME" >> "$GITHUB_OUTPUT"
          echo "db_ip=$DB_IP" >> "$GITHUB_OUTPUT"
          echo "::notice::Cloud SQL connection: $CONNECTION_NAME"
          echo "::notice::Cloud SQL IP: $DB_IP"

      - name: Create VPC Connector
        run: |
          gcloud compute networks vpc-access connectors create copilot-vpc \
            --region=${{ env.GCP_REGION }} \
            --range="10.8.0.0/28" \
            --quiet 2>/dev/null || echo "VPC connector already exists"

      - name: Upload Vertex AI SA key to Secret Manager
        run: |
          echo '${{ secrets.GCP_VERTEX_SA_KEY }}' > /tmp/vertex-sa.json
          gcloud secrets create vertex-sa-key --replication-policy=automatic 2>/dev/null || true
          gcloud secrets versions add vertex-sa-key --data-file=/tmp/vertex-sa.json
          gcloud secrets add-iam-policy-binding vertex-sa-key \
            --member="serviceAccount:${{ env.SA_EMAIL }}" \
            --role="roles/secretmanager.secretAccessor" --quiet 2>/dev/null || true
          rm /tmp/vertex-sa.json

  # ─── Step 2: Build & Push Docker Images ──────────────────────────────
  build:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    needs: [setup-infra]
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker
        run: gcloud auth configure-docker us-central1-docker.pkg.dev --quiet

      - name: Build & Push API
        run: |
          docker build -f infra/docker/Dockerfile.api \
            -t ${{ env.API_IMAGE }}:${{ github.sha }} \
            -t ${{ env.API_IMAGE }}:latest \
            backend/
          docker push ${{ env.API_IMAGE }}:${{ github.sha }}
          docker push ${{ env.API_IMAGE }}:latest

      - name: Build & Push Frontend
        run: |
          docker build -f infra/docker/Dockerfile.frontend \
            --build-arg NEXT_PUBLIC_API_URL=${{ secrets.API_URL }}/api/v1 \
            -t ${{ env.FRONTEND_IMAGE }}:${{ github.sha }} \
            -t ${{ env.FRONTEND_IMAGE }}:latest \
            frontend/
          docker push ${{ env.FRONTEND_IMAGE }}:${{ github.sha }}
          docker push ${{ env.FRONTEND_IMAGE }}:latest

  # ─── Step 3: Deploy API to Cloud Run ─────────────────────────────────
  deploy-api:
    name: Deploy API to Cloud Run
    runs-on: ubuntu-latest
    needs: [setup-infra, build]
    steps:
      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Get DB IP
        id: db
        run: |
          DB_IP=$(gcloud sql instances describe ${{ env.DB_INSTANCE }} --format='value(ipAddresses[0].ipAddress)')
          echo "ip=$DB_IP" >> "$GITHUB_OUTPUT"

      - name: Deploy API
        run: |
          gcloud run deploy ${{ env.API_SERVICE }} \
            --image ${{ env.API_IMAGE }}:${{ github.sha }} \
            --region ${{ env.GCP_REGION }} \
            --platform managed \
            --port 8000 \
            --memory 2Gi \
            --cpu 2 \
            --min-instances 0 \
            --max-instances 10 \
            --timeout 300 \
            --concurrency 80 \
            --allow-unauthenticated \
            --add-cloudsql-instances ${{ needs.setup-infra.outputs.db_connection_name }} \
            --set-env-vars "\
          ENVIRONMENT=production,\
          DEBUG=false,\
          CORS_ORIGINS=[\"https://copilot-frontend-712919537046.us-central1.run.app\"],\
          USE_VERTEX_AI=true,\
          CLAUDE_MODEL=claude-opus-4-6,\
          MAX_BUDGET_USD=10.0,\
          VERTEX_REGION=us-east5,\
          GCP_PROJECT_ID=project-pallavi-tarke,\
          GOOGLE_APPLICATION_CREDENTIALS=/secrets/vertex-sa-key,\
          GCP_CREDENTIALS_PATH=/secrets/vertex-sa-key,\
          POSTGRES_HOST=${{ steps.db.outputs.ip }},\
          POSTGRES_PORT=5432,\
          POSTGRES_USER=${{ env.DB_USER }},\
          POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }},\
          POSTGRES_DB=${{ env.DB_NAME }},\
          REDIS_URL=${{ secrets.REDIS_URL }},\
          CELERY_BROKER_URL=${{ secrets.REDIS_URL }},\
          MONGODB_URL=${{ secrets.MONGODB_URL }},\
          QDRANT_HOST=${{ secrets.QDRANT_HOST }},\
          QDRANT_PORT=${{ secrets.QDRANT_PORT }},\
          GITHUB_CLIENT_ID=${{ secrets.APP_GITHUB_CLIENT_ID }},\
          GITHUB_CLIENT_SECRET=${{ secrets.APP_GITHUB_CLIENT_SECRET }},\
          GITHUB_TOKEN=${{ secrets.APP_GITHUB_TOKEN }},\
          GITHUB_CALLBACK_URL=${{ secrets.API_URL }}/api/v1/auth/github/callback,\
          GITHUB_CONNECT_CALLBACK_URL=${{ secrets.API_URL }}/api/v1/auth/github/connect/callback,\
          JWT_SECRET=${{ secrets.JWT_SECRET }},\
          GCP_OAUTH_CLIENT_ID=${{ secrets.GCP_OAUTH_CLIENT_ID }},\
          GCP_OAUTH_CLIENT_SECRET=${{ secrets.GCP_OAUTH_CLIENT_SECRET }},\
          GCP_OAUTH_REDIRECT_URI=${{ secrets.API_URL }}/api/v1/auth/gcp/callback,\
          GOOGLE_SIGNIN_REDIRECT_URI=${{ secrets.API_URL }}/api/v1/auth/google/callback,\
          CREDENTIALS_ENCRYPTION_KEY=${{ secrets.CREDENTIALS_ENCRYPTION_KEY }},\
          ZOHO_CLIENT_ID=${{ secrets.ZOHO_CLIENT_ID }},\
          ZOHO_CLIENT_SECRET=${{ secrets.ZOHO_CLIENT_SECRET }},\
          ZOHO_REDIRECT_URI=${{ secrets.API_URL }}/api/v1/auth/zoho/callback" \
            --update-secrets "/secrets/vertex-sa-key=vertex-sa-key:latest" \
            --service-account ${{ env.SA_EMAIL }}

      - name: Get API URL
        id: api-url
        run: |
          URL=$(gcloud run services describe ${{ env.API_SERVICE }} --region ${{ env.GCP_REGION }} --format 'value(status.url)')
          echo "api_url=$URL" >> "$GITHUB_OUTPUT"
          echo "::notice::API deployed at: $URL"
          echo "::notice::Health check: $URL/health"
    outputs:
      api_url: ${{ steps.api-url.outputs.api_url }}

  # ─── Step 4: Deploy Frontend to Cloud Run ────────────────────────────
  deploy-frontend:
    name: Deploy Frontend to Cloud Run
    runs-on: ubuntu-latest
    needs: [build, deploy-api]
    steps:
      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Deploy Frontend
        run: |
          gcloud run deploy ${{ env.FRONTEND_SERVICE }} \
            --image ${{ env.FRONTEND_IMAGE }}:${{ github.sha }} \
            --region ${{ env.GCP_REGION }} \
            --platform managed \
            --port 3000 \
            --memory 512Mi \
            --cpu 1 \
            --min-instances 0 \
            --max-instances 5 \
            --timeout 60 \
            --allow-unauthenticated \
            --set-env-vars "NEXT_PUBLIC_API_URL=${{ needs.deploy-api.outputs.api_url }}/api/v1,NEXT_PUBLIC_WS_URL=${{ needs.deploy-api.outputs.api_url }}"

      - name: Get Frontend URL
        run: |
          URL=$(gcloud run services describe ${{ env.FRONTEND_SERVICE }} --region ${{ env.GCP_REGION }} --format 'value(status.url)')
          echo "::notice::Frontend deployed at: $URL"
